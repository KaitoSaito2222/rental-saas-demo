name: Terraform Plan and Apply

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply after a successful plan"
        required: true
        type: boolean
        default: false

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform format check
        run: terraform -chdir=infra fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=infra init -backend=false

      - name: Terraform plan
        run: terraform -chdir=infra plan -no-color

  apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'workflow_dispatch' && inputs.apply
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        run: terraform -chdir=infra init -backend=false

      - name: Terraform apply
        run: terraform -chdir=infra apply -auto-approve -no-color
