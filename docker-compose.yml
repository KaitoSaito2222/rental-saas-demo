services:
  postgres:
    image: postgres:16
    container_name: rental-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: property_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d property_copilot"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
